set timeout=1
set default=0
set gfxmode=auto
set gfxpayload=keep

menuentry "riverix" {
    multiboot /boot/kernel.elf root=disk
    boot
}

menuentry "riverix (recovery)" {
    multiboot /boot/kernel.elf root=ramdisk recovery=1
    module /boot/rootfs.img rootfs
    boot
}

menuentry "riverix (soak)" {
    multiboot /boot/kernel.elf root=disk soak=1
    boot
}

menuentry "riverix (recovery reinstall)" {
    multiboot /boot/kernel.elf root=ramdisk recovery=1 reinstall=1
    module /boot/rootfs.img rootfs
    boot
}
